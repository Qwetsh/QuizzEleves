name: Build app Windows (Tauri)

# Construit l'installeur .exe hors ligne sur un runner Windows (Visual Studio /
# MSVC déjà présents — ce que la machine locale n'a pas en compte standard).
# Déclenchement :
#   - manuel (onglet Actions → « Run workflow », possible depuis le mobile) ;
#   - automatique sur un tag de version « v* » (crée aussi une Release).
on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write   # nécessaire pour publier la Release sur un tag

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Toolchain Rust (stable MSVC)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # `tauri:build` lance d'abord `build:offline` (snapshot de la base +
      # build Vite mode offline), puis compile l'installeur NSIS. Le script de
      # snapshot lit Supabase via la clé anon publique (réseau dispo sur le runner).
      - name: Build de l'installeur
        run: npm run tauri:build

      - name: Upload de l'installeur (artefact téléchargeable)
        uses: actions/upload-artifact@v4
        with:
          name: quete-des-matieres-installeur
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      # Sur un tag « v* » : publie l'installeur dans une Release GitHub.
      - name: Publier la Release (sur tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
